<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advertising - Key2lix</title>
<meta name="description" content="Advertise with Key2lix - reach buyers and sellers">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="/assets/img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.ads-page { max-width: 640px; margin: 0 auto; padding: 32px 20px 56px; text-align: center; }
.ads-page .page-box { background: rgba(31,31,40,0.95); border-radius: 20px; padding: 40px 28px; border: 1px solid rgba(255,255,255,0.08); }
body.theme-light .ads-page .page-box { background: rgba(255,255,255,0.98); border-color: rgba(0,0,0,0.08); }
.ads-page h2 { color: #7c3aed; margin: 0 0 16px; font-size: 1.35rem; }
.ads-page p { color: #94a3b8; margin: 0 0 24px; line-height: 1.6; }
body.theme-light .ads-page p { color: #64748b; }
.ads-page .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; margin: 6px; transition: all 0.2s; }
.ads-page .btn-primary { background: #7c3aed; color: #fff; border: none; }
.ads-page .btn-primary:hover { background: #6d28d9; transform: translateY(-2px); }
</style>
</head>
<body>
<div id="navbar"></div>
<main id="main-content" class="ads-page">
<header class="hero hero-products">
  <h1 data-i18n="footerAdvertising">Advertising</h1>
  <p data-i18n="heroDesc" style="margin:8px 0 0; color:#a78bfa;">Reach buyers and sellers on Key2lix</p>
</header>
<div class="page-box">
  <h2 data-i18n="adsTitle">Advertising on Key2lix</h2>
  <p data-i18n="adsDesc">Want to promote your products or become a seller? Register as a vendor to list your products and reach our customers. For custom advertising options, contact us.</p>
  <a href="/vendor-register" class="btn btn-primary"><i class="fas fa-store" aria-hidden="true"></i> <span data-i18n="footerSellWithUs">Sell with us</span></a>
  <a href="/contact" class="btn btn-primary"><i class="fas fa-envelope" aria-hidden="true"></i> <span data-i18n="contact">Contact</span></a>
</div>
</main>
<div id="footer"></div>
<script src="/assets/js/lang.js"></script>
<script src="/assets/js/common.js"></script>
</body>
</html>
