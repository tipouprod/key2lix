<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="orderChatTitle">محادثة الطلب - Key2lix</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="/assets/img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== Order Chat — احترافي · مبتكر · قوي ===== */
:root {
  --ochat-bg: linear-gradient(160deg, #0f0e17 0%, #1a1625 35%, #15121f 100%);
  --ochat-card: linear-gradient(145deg, rgba(28,25,45,0.95) 0%, rgba(22,19,35,0.98) 100%);
  --ochat-border: rgba(124,58,237,0.4);
  --ochat-glow: rgba(124,58,237,0.25);
  --ochat-you: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #5b21b6 100%);
  --ochat-them: linear-gradient(145deg, rgba(51,65,85,0.9) 0%, rgba(30,41,59,0.95) 100%);
  --ochat-input-bg: rgba(15,10,25,0.8);
}
body.theme-light {
  --ochat-bg: linear-gradient(160deg, #faf5ff 0%, #f3e8ff 40%, #ede9fe 100%);
  --ochat-card: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
  --ochat-border: rgba(124,58,237,0.35);
  --ochat-glow: rgba(124,58,237,0.12);
  --ochat-input-bg: rgba(255,255,255,0.9);
}

.order-chat-page {
  min-height: 100vh;
  background: var(--ochat-bg);
  position: relative;
  overflow-x: hidden;
}
.order-chat-page::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -20%, var(--ochat-glow), transparent 50%);
  pointer-events: none;
  z-index: 0;
}
body.theme-light .order-chat-page::before {
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,58,237,0.08), transparent 50%);
}

.order-chat-page .page-hero {
  padding: 28px 24px 24px;
  margin-bottom: 0;
  position: relative;
  z-index: 1;
}
.order-chat-page .page-hero h1 {
  font-size: 1.75rem;
  font-weight: 800;
  margin: 0 0 6px;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #e9d5ff 0%, #c4b5fd 50%, #a78bfa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
body.theme-light .order-chat-page .page-hero h1 {
  background: linear-gradient(135deg, #6d28d9 0%, #7c3aed 50%, #8b5cf6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.order-chat-page .page-hero .ochat-subtitle {
  font-size: 0.9rem;
  color: #94a3b8;
  margin: 0;
}
body.theme-light .order-chat-page .page-hero .ochat-subtitle { color: #64748b; }

.chat-section {
  position: relative;
  z-index: 1;
  flex: 1;
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
  padding: 0 24px 32px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.chat-section .chat-error {
  border-radius: 16px;
  margin: 16px 0;
  padding: 20px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
}

/* Placeholder — مبتكر */
.chat-placeholder-box {
  text-align: center;
  padding: 56px 32px;
  background: var(--ochat-card);
  border: 2px dashed var(--ochat-border);
  border-radius: 24px;
  color: #94a3b8;
  position: relative;
  overflow: hidden;
}
.chat-placeholder-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(124,58,237,0.06), transparent 40%);
}
.chat-placeholder-box i {
  font-size: 4rem;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
  display: block;
  position: relative;
  animation: ochat-icon-float 3s ease-in-out infinite;
}
@keyframes ochat-icon-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.chat-placeholder-box p { margin: 0; font-size: 1.05rem; position: relative; }

/* بطاقة الطلب — glass · gradient · قوية */
.chat-order-card {
  flex-shrink: 0;
  background: var(--ochat-card);
  border: 1px solid var(--ochat-border);
  border-radius: 20px;
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03), 0 0 60px -20px rgba(124,58,237,0.3);
  position: relative;
  overflow: hidden;
}
.chat-order-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(124,58,237,0.6), transparent);
  opacity: 0.8;
}
body.theme-light .chat-order-card {
  box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04), 0 0 40px -15px rgba(124,58,237,0.15);
}
body.theme-light .chat-order-card::after { opacity: 0.5; }

.chat-order-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 18px;
}
.chat-order-card-id {
  font-size: 1.15rem;
  font-weight: 800;
  color: #c4b5fd;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-order-card-id i {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--ochat-you);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
}
.chat-order-status {
  font-size: 0.7rem;
  font-weight: 800;
  padding: 8px 14px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.chat-order-status.pending {
  background: linear-gradient(135deg, rgba(234,179,8,0.25) 0%, rgba(202,138,4,0.2) 100%);
  color: #fde047;
  border: 1px solid rgba(234,179,8,0.5);
}
.chat-order-status.completed {
  background: linear-gradient(135deg, rgba(34,197,94,0.25) 0%, rgba(22,163,74,0.2) 100%);
  color: #86efac;
  border: 1px solid rgba(34,197,94,0.5);
}
.chat-order-status.preparing {
  background: linear-gradient(135deg, rgba(59,130,246,0.25) 0%, rgba(37,99,235,0.2) 100%);
  color: #93c5fd;
  border: 1px solid rgba(59,130,246,0.5);
}
.chat-order-pdf-link {
  margin-right: 12px; font-size: 0.85rem; color: #a78bfa; text-decoration: none; font-weight: 600;
}
.chat-order-pdf-link:hover { color: #c4b5fd; text-decoration: underline; }
body.theme-light .chat-order-pdf-link { color: #6d28d9; }
body.theme-light .chat-order-pdf-link:hover { color: #5b21b6; }

.chat-order-meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px 24px;
  font-size: 0.9rem;
}
.chat-order-meta span { display: block; }
.chat-order-meta .meta-label {
  color: #64748b;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.chat-order-meta .meta-value {
  color: #e2e8f0;
  font-weight: 700;
  font-size: 0.95rem;
}
body.theme-light .chat-order-meta .meta-value { color: #1e293b; }

.chat-order-vendor {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
body.theme-light .chat-order-vendor { border-top-color: rgba(0,0,0,0.06); }
.chat-order-vendor img {
  width: 44px;
  height: 44px;
  object-fit: cover;
  border-radius: 14px;
  border: 2px solid rgba(124,58,237,0.35);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.chat-order-vendor .vendor-name { font-weight: 800; color: #c4b5fd; font-size: 1rem; display: block; margin-bottom: 2px; }
.chat-order-vendor .vendor-time {
  font-size: 0.8rem;
  color: #a78bfa;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.chat-order-vendor .vendor-time::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: ochat-pulse 2s ease-in-out infinite;
}
.chat-order-anydesk-client {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
body.theme-light .chat-order-anydesk-client { border-top-color: rgba(0,0,0,0.06); }
.chat-order-anydesk-client .anydesk-label { font-size: 0.85rem; font-weight: 700; color: #a78bfa; display: block; margin-bottom: 10px; }
.chat-order-anydesk-client .anydesk-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.chat-order-anydesk-client .anydesk-input {
  flex: 1;
  min-width: 140px;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(124,58,237,0.4);
  background: rgba(0,0,0,0.2);
  color: inherit;
  font-family: monospace;
  font-size: 0.95rem;
  letter-spacing: 0.05em;
}
.chat-order-anydesk-client .anydesk-btn {
  padding: 10px 18px;
  border-radius: 10px;
  background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.chat-order-anydesk-client .anydesk-btn:hover { opacity: 0.95; transform: translateY(-1px); }
@keyframes ochat-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

/* منطقة الرسائل — عمق · فقاعات قوية */
.chat-messages-wrap {
  flex: 1;
  min-height: 320px;
  max-height: 55vh;
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--ochat-input-bg);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: inset 0 2px 24px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.03);
}
body.theme-light .chat-messages-wrap {
  background: rgba(255,255,255,0.7);
  border-color: rgba(0,0,0,0.06);
  box-shadow: inset 0 1px 12px rgba(0,0,0,0.04);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 10px; }
.chat-messages::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.15);
  border-radius: 5px;
  margin: 8px 0;
}
.chat-messages::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, rgba(124,58,237,0.5) 0%, rgba(88,28,135,0.5) 100%);
  border-radius: 5px;
}
.chat-messages::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #7c3aed 0%, #5b21b6 100%); }

/* فواصل الأيام */
.chat-day-sep {
  text-align: center;
  margin: 20px 0;
}
.chat-day-sep span {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
}
body.theme-light .chat-day-sep span {
  background: rgba(0,0,0,0.04);
  border-color: rgba(0,0,0,0.06);
  color: #64748b;
}

.chat-msg {
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  max-width: 85%;
  animation: ochat-msg-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.chat-msg.client { margin-right: 0; margin-left: auto; flex-direction: row-reverse; }
.chat-msg-avatar {
  width: 44px;
  height: 44px;
  flex-shrink: 0;
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.chat-msg.client .chat-msg-avatar {
  background: var(--ochat-you);
  box-shadow: 0 4px 20px rgba(124,58,237,0.45);
}
.chat-msg.vendor .chat-msg-avatar {
  background: var(--ochat-them);
  border: 1px solid rgba(255,255,255,0.1);
}
.chat-msg.support .chat-msg-avatar {
  background: transparent;
  border: none;
  padding: 2px;
  overflow: hidden;
}
.chat-msg-avatar-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.chat-msg.support .chat-msg-bubble {
  background: linear-gradient(145deg, rgba(124,58,237,0.18) 0%, rgba(13,125,77,0.12) 100%);
  border: 1px solid rgba(124,58,237,0.35);
  border-bottom-right-radius: 6px;
  box-shadow: 0 2px 14px rgba(124,58,237,0.2);
}
.chat-msg.support:hover .chat-msg-bubble {
  background: linear-gradient(145deg, rgba(124,58,237,0.22) 0%, rgba(13,125,77,0.16) 100%);
  box-shadow: 0 4px 18px rgba(124,58,237,0.28);
}
.chat-msg-bubble {
  padding: 14px 18px;
  border-radius: 18px;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.chat-msg:hover .chat-msg-bubble {
  transform: translateY(-1px);
}
.chat-msg.client .chat-msg-bubble {
  background: linear-gradient(145deg, rgba(124,58,237,0.4) 0%, rgba(88,28,135,0.35) 100%);
  border: 1px solid rgba(124,58,237,0.5);
  border-bottom-left-radius: 6px;
  box-shadow: 0 4px 20px rgba(124,58,237,0.25);
}
.chat-msg.client:hover .chat-msg-bubble {
  box-shadow: 0 6px 28px rgba(124,58,237,0.35);
}
.chat-msg.vendor .chat-msg-bubble {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-bottom-right-radius: 6px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.chat-msg.vendor:hover .chat-msg-bubble {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.chat-msg-meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.chat-msg.client .chat-msg-meta { justify-content: flex-end; }
.chat-msg-body {
  color: #e2e8f0;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.975rem;
  line-height: 1.55;
}
body.theme-light .chat-msg.vendor .chat-msg-body { color: #334155; }
body.theme-light .chat-msg.support .chat-msg-body { color: #1e293b; }
.chat-msg-time {
  font-size: 0.7rem;
  color: #64748b;
  opacity: 0.9;
}

.chat-empty {
  text-align: center;
  padding: 56px 28px;
  color: #64748b;
}
.chat-empty i {
  font-size: 3.5rem;
  background: linear-gradient(135deg, rgba(124,58,237,0.4) 0%, rgba(167,139,250,0.3) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 18px;
  display: block;
}
.chat-empty p { margin: 0; font-size: 1.05rem; font-weight: 500; }

/* زر التمرير — pill مع عدد */
.chat-scroll-down {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 52px;
  height: 52px;
  padding: 0 20px;
  border-radius: 999px;
  background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.25);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 700;
  font-size: 0.85rem;
  box-shadow: 0 8px 32px rgba(124,58,237,0.5), 0 0 0 0 rgba(124,58,237,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 5;
  animation: ochat-scroll-pulse 2.5s ease-in-out infinite;
}
.chat-scroll-down:hover {
  transform: translateX(-50%) translateY(-3px);
  box-shadow: 0 12px 40px rgba(124,58,237,0.55), 0 0 0 8px rgba(124,58,237,0.1);
}
.chat-scroll-down.show { display: inline-flex; }
@keyframes ochat-scroll-pulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(124,58,237,0.5), 0 0 0 0 rgba(124,58,237,0.3); }
  50% { box-shadow: 0 8px 32px rgba(124,58,237,0.55), 0 0 0 6px rgba(124,58,237,0.08); }
}

/* نموذج الإرسال — بارز · واضح */
.chat-form-wrap { flex-shrink: 0; padding: 20px 0 0; }
.chat-form {
  display: flex;
  gap: 14px;
  align-items: flex-end;
  background: var(--ochat-card);
  border: 1px solid var(--ochat-border);
  border-radius: 20px;
  padding: 16px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04), 0 0 40px -10px rgba(124,58,237,0.2);
}
body.theme-light .chat-form {
  box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
}
.chat-form textarea {
  flex: 1;
  min-height: 52px;
  max-height: 140px;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: var(--ochat-input-bg);
  color: inherit;
  font: inherit;
  font-size: 0.95rem;
  resize: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.chat-form textarea:focus {
  outline: none;
  border-color: rgba(124,58,237,0.6);
  box-shadow: 0 0 0 4px rgba(124,58,237,0.15);
}
body.theme-light .chat-form textarea {
  background: #f8fafc;
  border-color: rgba(0,0,0,0.1);
  color: #1e293b;
}
body.theme-light .chat-form textarea:focus {
  border-color: rgba(124,58,237,0.5);
  box-shadow: 0 0 0 4px rgba(124,58,237,0.1);
}
.chat-form textarea::placeholder { color: #64748b; }
.chat-form-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.chat-form-actions .chat-char-count {
  font-size: 0.7rem;
  font-weight: 600;
  color: #64748b;
  letter-spacing: 0.02em;
}
.chat-form-actions .chat-char-count.warn { color: #f59e0b; }
.chat-form-actions .chat-char-count.max { color: #ef4444; }
.chat-form button[type="submit"] {
  padding: 14px 28px;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #5b21b6 100%);
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: 800;
  font-size: 0.95rem;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(124,58,237,0.45);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
}
.chat-form button[type="submit"]:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 28px rgba(124,58,237,0.5);
}
.chat-form button[type="submit"]:active:not(:disabled) { transform: translateY(0) scale(0.98); }
.chat-form button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

/* تحميل — shimmer قوي */
.chat-loading { padding: 28px; }
.chat-loading-skeleton {
  height: 64px;
  border-radius: 16px;
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 20%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 80%);
  background-size: 200% 100%;
  animation: ochat-shimmer 1.4s ease-in-out infinite;
  margin-bottom: 16px;
}
.chat-loading-skeleton.short { width: 55%; margin-right: auto; }
.chat-loading-skeleton.long { width: 78%; margin-left: auto; }
@keyframes ochat-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
body.theme-light .chat-loading-skeleton {
  background: linear-gradient(90deg, rgba(0,0,0,0.04) 20%, rgba(0,0,0,0.08) 50%, rgba(0,0,0,0.04) 80%);
  background-size: 200% 100%;
}
</style>
</head>
<body>
<div id="navbar"></div>
<main id="main-content" class="order-chat-page">
  <header class="page-hero">
    <h1 data-i18n="orderChatTitle">محادثة الطلب</h1>
    <p class="ochat-subtitle" data-i18n="orderChatSubtitle">تواصل مع البائع ومتابعة طلبك</p>
  </header>
  <section class="chat-section">
    <div id="order-chat-placeholder" class="chat-placeholder-box" style="display:none;">
      <i class="fas fa-comment-dots" aria-hidden="true"></i>
      <p data-i18n="orderChatPlaceholder">افتح الصفحة مع رقم الطلب: /order-chat?order=رقم-الطلب</p>
    </div>
    <div id="order-chat-error" class="chat-error" style="display:none;"></div>
    <div id="order-chat-content" style="display:none;">
      <div id="order-chat-order-info" class="chat-order-card"></div>
      <div class="chat-messages-wrap">
        <div id="order-chat-messages" class="chat-messages" role="log" aria-live="polite" aria-label="رسائل المحادثة"></div>
        <button type="button" class="chat-scroll-down" id="chat-scroll-down" aria-label="التمرير للأسفل">
          <i class="fas fa-chevron-down"></i>
          <span class="chat-scroll-down-label" id="chat-scroll-down-label">أحدث الرسائل</span>
        </button>
      </div>
      <div class="chat-form-wrap">
        <form id="order-chat-form" class="chat-form">
          <textarea id="order-chat-input" placeholder="" maxlength="2000" rows="1" required aria-label="نص الرسالة"></textarea>
          <div class="chat-form-actions">
            <span class="chat-char-count" id="chat-char-count" aria-live="polite">0 / 2000</span>
            <button type="submit" id="order-chat-send"><i class="fas fa-paper-plane"></i> <span data-i18n="contactSendBtn">إرسال</span></button>
          </div>
        </form>
      </div>
    </div>
    <div id="order-chat-loading" class="chat-loading" style="display:none;">
      <div class="chat-loading-skeleton short"></div>
      <div class="chat-loading-skeleton long"></div>
      <div class="chat-loading-skeleton short"></div>
      <div class="chat-loading-skeleton long"></div>
      <div class="chat-loading-skeleton short"></div>
    </div>
  </section>
</main>
<div id="footer"></div>
<script src="/assets/js/lang.js"></script>
<script src="/assets/js/common.js"></script>
<script>
(function() {
  function t(k) { return (window.Key2lixLang && window.Key2lixLang.get(k)) || k; }
  var params = new URLSearchParams(window.location.search);
  var orderId = params.get('order') || params.get('orderId');
  var placeholder = document.getElementById('order-chat-placeholder');
  var errorEl = document.getElementById('order-chat-error');
  var contentEl = document.getElementById('order-chat-content');
  var loadingEl = document.getElementById('order-chat-loading');
  var orderInfoEl = document.getElementById('order-chat-order-info');
  var messagesEl = document.getElementById('order-chat-messages');
  var scrollDownBtn = document.getElementById('chat-scroll-down');
  var scrollDownLabel = document.getElementById('chat-scroll-down-label');
  var form = document.getElementById('order-chat-form');
  var input = document.getElementById('order-chat-input');
  var sendBtn = document.getElementById('order-chat-send');
  var charCountEl = document.getElementById('chat-char-count');
  var MAX_LEN = 2000;

  function showLoading(show) {
    if (loadingEl) loadingEl.style.display = show ? 'block' : 'none';
    if (contentEl) contentEl.style.display = show ? 'none' : 'block';
    if (placeholder && placeholder.style) placeholder.style.display = 'none';
  }
  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    contentEl.style.display = 'none';
    if (loadingEl) loadingEl.style.display = 'none';
  }
  function showContent() {
    errorEl.style.display = 'none';
    contentEl.style.display = 'block';
    if (loadingEl) loadingEl.style.display = 'none';
  }

  function loadOrder() {
    return fetch('/api/order/' + encodeURIComponent(orderId), { credentials: 'same-origin' })
      .then(function(r) {
        if (r.status === 403) throw new Error(t('loginRequiredMessage') || 'يجب تسجيل الدخول');
        if (!r.ok) throw new Error('Order not found');
        return r.json();
      });
  }
  function loadMessages() {
    return fetch('/api/order/' + encodeURIComponent(orderId) + '/messages', { credentials: 'same-origin' })
      .then(function(r) { if (!r.ok) return []; return r.json(); });
  }

  function parseValueLabelAndValue(val) {
    var empty = { label: '—', value: '—' };
    if (!val || String(val).trim() === '') return empty;
    var s = String(val).trim();
    var fmt = window.formatPriceDzd || function(n) { return n; };
    var sepMatch = s.match(/\s*-\s*/);
    if (sepMatch) {
      var idx = s.indexOf(sepMatch[0]);
      var optionLabel = s.substring(0, idx).trim();
      var amountStr = s.substring(idx + sepMatch[0].length).trim();
      var numStr = amountStr.replace(/\s/g, '').replace(/,/g, '.').replace(/[^\d.]/g, '');
      var num = parseFloat(numStr) || 0;
      var amountFormatted = num ? fmt(num) : amountStr;
      return { label: optionLabel || '—', value: amountFormatted };
    }
    var num = parseFloat(s.replace(/\s/g, '').replace(/,/g, '.').replace(/[^\d.]/g, ''));
    return { label: '—', value: !isNaN(num) && num > 0 ? fmt(num) : s };
  }

  function relativeTime(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr.slice(0, 16);
    var now = new Date();
    var diff = (now - d) / 1000;
    if (diff < 60) return (t('timeJustNow') || 'منذ لحظات');
    if (diff < 3600) return (t('timeMinutesAgo') || 'منذ {{n}} د').replace('{{n}}', Math.floor(diff / 60));
    if (diff < 86400) return (t('timeHoursAgo') || 'منذ {{n}} س').replace('{{n}}', Math.floor(diff / 3600));
    if (diff < 172800) return (t('timeYesterday') || 'أمس');
    return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  }

  function getDayKey(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
  }
  function daySeparatorLabel(dayKey) {
    var today = getDayKey(new Date().toISOString());
    var yesterday = getDayKey(new Date(Date.now() - 86400000).toISOString());
    if (dayKey === today) return t('today') || 'اليوم';
    if (dayKey === yesterday) return t('timeYesterday') || 'أمس';
    return dayKey;
  }

  function renderOrder(order) {
    var parsed = parseValueLabelAndValue(order.value);
    var labelLbl = t('labelLabel') || 'التسمية';
    var valueLbl = t('labelValue') || 'القيمة';
    var status = (order.status || 'pending').toLowerCase();
    var statusText = status === 'completed' ? (t('orderStatusCompleted') || 'مكتمل') : status === 'preparing' ? (t('statusPreparing') || 'قيد التجهيز') : (t('orderStatusPending') || 'قيد التنفيذ');
    var pdfL = t('downloadInvoice') || 'تحميل PDF';
    var pdfUrl = '/api/order/' + encodeURIComponent(order.id || '') + '/invoice.pdf';
    var html = '<div class="chat-order-card-header"><div class="chat-order-card-id"><i class="fas fa-receipt"></i> ' + (t('orderId') || 'طلب') + ' ' + (order.id || '').replace(/</g, '&lt;') + '</div><span class="chat-order-status ' + status + '">' + statusText.replace(/</g, '&lt;') + '</span> <a href="' + pdfUrl + '" target="_blank" rel="noopener" class="chat-order-pdf-link"><i class="fas fa-file-pdf"></i> ' + pdfL.replace(/</g, '&lt;') + '</a></div>';
    html += '<div class="chat-order-meta"><span><span class="meta-label">' + (t('labelProduct') || 'المنتج') + '</span><span class="meta-value">' + (order.product || '—').replace(/</g, '&lt;') + '</span></span>';
    html += '<span><span class="meta-label">' + labelLbl + '</span><span class="meta-value">' + (parsed.label || '—').replace(/</g, '&lt;') + '</span></span>';
    html += '<span><span class="meta-label">' + valueLbl + '</span><span class="meta-value">' + (parsed.value || '—').replace(/</g, '&lt;') + '</span></span></div>';
    if (order.vendor_info) {
      html += '<div class="chat-order-vendor">';
      if (order.vendor_info.logo) html += '<img src="' + (order.vendor_info.logo.indexOf('/') === 0 ? '' : '/') + order.vendor_info.logo.replace(/</g, '&lt;') + '" alt="">';
      html += '<div><span class="vendor-name">' + (order.vendor_info.name || 'البائع').replace(/</g, '&lt;') + '</span>';
      if (order.vendor_info.response_time_hours != null && order.vendor_info.response_time_hours > 0) html += '<span class="vendor-time">' + (t('vendorRepliesWithin') || 'يرد عادة خلال') + ' ' + order.vendor_info.response_time_hours + ' ' + (t('hours') || 'ساعة') + '</span>';
      html += '</div></div>';
    }
    if (order.my_role === 'client') {
      var anydeskLbl = (t('anydeskSendToVendor') || 'أرسل رقم AnyDesk للبائع ليتمكن من الاتصال بك وحل المشكلة');
      var anydeskBtn = (t('anydeskSendBtn') || 'إرسال للبائع');
      html += '<div class="chat-order-anydesk-client"><span class="anydesk-label">' + anydeskLbl.replace(/</g, '&lt;') + '</span><div class="anydesk-row"><input type="text" class="anydesk-input" id="order-chat-anydesk-input" placeholder="123 456 789" maxlength="20" aria-label="رقم AnyDesk"><button type="button" class="anydesk-btn" id="order-chat-anydesk-send"><i class="fas fa-paper-plane"></i> ' + anydeskBtn.replace(/</g, '&lt;') + '</button></div></div>';
    }
    orderInfoEl.innerHTML = html;
    var anydeskSendBtn = document.getElementById('order-chat-anydesk-send');
    var anydeskInput = document.getElementById('order-chat-anydesk-input');
    if (anydeskSendBtn && anydeskInput) {
      anydeskSendBtn.addEventListener('click', function() {
        var code = (anydeskInput.value || '').trim();
        if (!code) {
          if (window.Key2lixToast) window.Key2lixToast(t('anydeskEnterCode') || 'أدخل رقم AnyDesk أولاً', 'error');
          return;
        }
        var msg = (t('anydeskMessageTemplate') || 'رقم AnyDesk للاتصال بي وحل المشكلة: {{code}}').replace('{{code}}', code);
        input.value = msg;
        sendMessage();
        anydeskInput.value = '';
      });
    }
  }

  var lastMessageCount = 0;
  var lastLastId = 0;
  function renderMessages(list) {
    if (!list || !list.length) {
      messagesEl.innerHTML = '<div class="chat-empty"><i class="fas fa-comments" aria-hidden="true"></i><p>' + (t('noMessagesYet') || 'لا توجد رسائل بعد.') + '</p></div>';
      lastMessageCount = 0;
      lastLastId = 0;
      updateScrollDownButton(false);
      return;
    }
    var lastId = (list[list.length - 1] && list[list.length - 1].id) || 0;
    if (list.length === lastMessageCount && lastId === lastLastId) return;
    lastMessageCount = list.length;
    lastLastId = lastId;
    var wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop <= messagesEl.clientHeight + 80;
    var lastDayKey = '';
    var parts = [];
    for (var i = 0; i < list.length; i++) {
      var m = list[i];
      var dayKey = getDayKey(m.created_at);
      if (dayKey && dayKey !== lastDayKey) {
        lastDayKey = dayKey;
        parts.push('<div class="chat-day-sep"><span>' + daySeparatorLabel(dayKey).replace(/</g, '&lt;') + '</span></div>');
      }
      var isClient = m.from_role === 'client';
      var isSupport = m.from_role === 'admin';
      var msgClass = isClient ? 'client' : (isSupport ? 'support' : 'vendor');
      var name = (m.from_name || (isClient ? (t('you') || 'أنت') : (isSupport ? 'Support' : 'البائع'))).replace(/</g, '&lt;');
      var avatarHtml = isSupport ? '<img src="/assets/img/support-logo.png" alt="Support" class="chat-msg-avatar-img">' : ('<span aria-hidden="true">' + ((name && name[0]) ? name[0].toUpperCase() : (isClient ? 'أ' : 'ب')) + '</span>');
      var relTime = relativeTime(m.created_at);
      var fullTime = (m.created_at || '').slice(0, 19).replace('T', ' ');
      parts.push('<div class="chat-msg ' + msgClass + '" style="animation-delay:' + (i * 0.03) + 's"><div class="chat-msg-avatar">' + avatarHtml + '</div><div class="chat-msg-bubble"><div class="chat-msg-meta">' + name + ' <span class="chat-msg-time" title="' + fullTime.replace(/"/g, '&quot;') + '">' + relTime + '</span></div><div class="chat-msg-body">' + (m.body || '').replace(/</g, '&lt;').replace(/\n/g, '<br>') + '</div></div></div>');
    }
    messagesEl.innerHTML = parts.join('');
    if (wasAtBottom) requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
    updateScrollDownButton(!wasAtBottom);
  }

  function updateScrollDownButton(show) {
    if (!scrollDownBtn) return;
    if (show) {
      scrollDownBtn.classList.add('show');
      if (scrollDownLabel) scrollDownLabel.textContent = t('newMessages') || 'أحدث الرسائل';
    } else scrollDownBtn.classList.remove('show');
  }
  function checkScrollForScrollButton() {
    if (!messagesEl) return;
    var atBottom = messagesEl.scrollHeight - messagesEl.scrollTop <= messagesEl.clientHeight + 80;
    updateScrollDownButton(!atBottom);
  }
  if (scrollDownBtn) {
    scrollDownBtn.addEventListener('click', function() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
      updateScrollDownButton(false);
    });
  }
  if (messagesEl) messagesEl.addEventListener('scroll', checkScrollForScrollButton);

  function updateCharCount() {
    if (!charCountEl || !input) return;
    var n = (input.value || '').length;
    charCountEl.textContent = n + ' / ' + MAX_LEN;
    charCountEl.classList.remove('warn', 'max');
    if (n > MAX_LEN * 0.9) charCountEl.classList.add('max');
    else if (n > MAX_LEN * 0.75) charCountEl.classList.add('warn');
  }

  var pollIntervalMs = 4000;
  var pollTimer = null;
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(function() {
      if (document.visibilityState === 'hidden') return;
      loadMessages().then(renderMessages).catch(function() {});
    }, pollIntervalMs);
  }
  function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') startPolling(); else stopPolling();
  });

  function sendMessage() {
    var msg = (input && input.value || '').trim();
    if (!msg) return;
    sendBtn.disabled = true;
    fetch('/api/order/' + encodeURIComponent(orderId) + '/messages', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    })
      .then(function(r) {
        if (r.ok || r.status === 201) {
          input.value = '';
          updateCharCount();
          return loadMessages().then(renderMessages);
        }
        return r.json().then(function(d) { throw new Error(d.error || 'Failed'); });
      })
      .catch(function(err) {
        if (window.Key2lixToast) window.Key2lixToast(err.message || t('connectionError'), 'error');
      })
      .then(function() { sendBtn.disabled = false; });
  }

  function markOrderChatNotificationsRead() {
    fetch('/api/notifications/read-order-chat', { method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ orderId: orderId }) }).catch(function() {});
  }

  if (!orderId) {
    placeholder.querySelector('p').textContent = t('orderChatPlaceholder') || 'افتح الصفحة مع رقم الطلب في الرابط.';
    placeholder.style.display = 'block';
    return;
  }
  placeholder.style.display = 'none';
  showLoading(true);

  loadOrder()
    .then(function(order) {
      showContent();
      renderOrder(order);
      input.placeholder = t('contactMessagePlaceholder') || 'اكتب رسالتك...';
      input.setAttribute('aria-label', t('contactMessagePlaceholder') || 'نص الرسالة');
      markOrderChatNotificationsRead();
      return loadMessages();
    })
    .then(function(list) {
      renderMessages(list);
      if (document.visibilityState !== 'hidden') startPolling();
    })
    .catch(function(err) {
      showLoading(false);
      showError(err.message || 'Unable to load order.');
    });

  if (form) form.addEventListener('submit', function(e) { e.preventDefault(); sendMessage(); });
  if (input) {
    input.addEventListener('input', updateCharCount);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  }
  if (charCountEl) updateCharCount();
})();
</script>
</body>
</html>
