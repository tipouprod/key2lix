<!DOCTYPE html>
<html lang="ar" dir="rtl" data-key2lix-search="1">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key2lix - Software</title>
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="/assets/img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.under-construction { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 50vh; text-align: center; padding: 32px 20px; }
.under-construction h2 { color: #7c3aed; margin: 0 0 12px; font-size: 1.35rem; }
.under-construction p { color: #94a3b8; margin: 0 0 24px; max-width: 420px; }
body.theme-light .under-construction p { color: #64748b; }
.under-construction .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; font-weight: 600; border-radius: 10px; text-decoration: none; margin: 6px; transition: all 0.2s; }
.under-construction .home-btn { background: #7c3aed; color: #fff; border: none; }
.under-construction .home-btn:hover { background: #6d28d9; transform: translateY(-2px); }
.under-construction .whatsapp-btn { background: #25D366; color: #fff; border: none; }
.under-construction .whatsapp-btn:hover { background: #128C7E; transform: translateY(-2px); }
</style>
</head>
<body>
<div id="navbar"></div>
<main id="main-content">
<header class="hero hero-products">
  <h1 data-i18n="software">Software</h1>
  <p data-i18n="heroDesc" style="margin:8px 0 0;">Fast Delivery – Reliable – Local</p>
</header>
<div class="under-construction">
  <h2>🚧 <span data-i18n="underConstruction">This page is under construction</span></h2>
  <p data-i18n="underConstructionDesc">This section is being developed. You can return to the home page or contact us on WhatsApp to request a product.</p>
  <a href="/" class="btn home-btn"><i class="fas fa-home" aria-hidden="true"></i> <span data-i18n="backToHome">Back to home</span></a>
  <a href="#" target="_blank" rel="noopener" class="btn whatsapp-btn"><i class="fab fa-whatsapp" aria-hidden="true"></i> <span data-i18n="orderViaWhatsapp">Order via WhatsApp</span></a>
</div>
</main>
<div id="footer"></div>
<script src="/assets/js/lang.js"></script>
<script src="/assets/js/common.js"></script>
</body>
</html>
