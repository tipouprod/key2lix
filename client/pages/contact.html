<!DOCTYPE html>
<html lang="ar" dir="rtl" data-key2lix-search="1">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key2lix - Contact</title>
<meta name="description" content="Contact Key2lix - support and inquiries">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="/assets/img/favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
/* ===== Contact — واجهة احترافية ===== */
.contact-page { max-width: 1100px; margin: 0 auto; padding: 0 24px 72px; }
.contact-container {
  display: flex; justify-content: center; align-items: stretch;
  gap: 32px; flex-wrap: wrap; padding: 24px 0;
}
.contact-form-wrap, .contact-info-wrap {
  flex: 1; min-width: 280px; max-width: 480px;
  background: rgba(24,24,35,0.9); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.03);
  transition: box-shadow 0.25s ease;
}
.contact-form-wrap:hover, .contact-info-wrap:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,58,237,0.1);
}
.contact-form-head, .contact-info-head {
  padding: 22px 26px; border-bottom: 1px solid rgba(255,255,255,0.06);
  background: linear-gradient(90deg, rgba(124,58,237,0.08) 0%, transparent 100%);
}
.contact-form-head h2, .contact-info-head h3 {
  margin: 0; font-size: 1.15rem; font-weight: 700; color: #e2e8f0;
  display: flex; align-items: center; gap: 12px;
}
.contact-form-head h2 i, .contact-info-head h3 i {
  color: #a78bfa; font-size: 1.1rem;
}
.contact-form { padding: 28px 26px 32px; }
.contact-form label {
  display: block; margin: 0 0 8px; font-size: 0.9rem; font-weight: 600; color: #cbd5e1;
}
.contact-form .form-row { margin-bottom: 20px; }
.contact-form input, .contact-form textarea {
  width: 100%; padding: 14px 18px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.25);
  color: #f1f5f9; font-size: 1rem; box-sizing: border-box;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.contact-form input::placeholder, .contact-form textarea::placeholder { color: #64748b; }
.contact-form input:focus, .contact-form textarea:focus {
  outline: none; border-color: #7c3aed; box-shadow: 0 0 0 4px rgba(124,58,237,0.2);
}
.contact-form textarea { min-height: 130px; resize: vertical; }
.contact-form button[type="submit"] {
  width: 100%; margin-top: 8px; padding: 16px;
  background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
  color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}
.contact-form button[type="submit"]:hover:not(:disabled) {
  transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.5);
}
.contact-form button[type="submit"]:disabled { opacity: 0.8; cursor: not-allowed; }
#formMessage { margin-top: 14px; text-align: center; font-size: 0.9rem; font-weight: 500; color: #94a3b8; }

.contact-info-body { padding: 24px 26px 28px; }
.contact-info-section { margin-bottom: 24px; }
.contact-info-section:last-of-type { margin-bottom: 0; }
.contact-info-section h3 { margin: 0 0 14px; font-size: 0.95rem; }
.contact-info-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
  color: #cbd5e1; font-size: 0.95rem;
}
.contact-info-row:last-child { margin-bottom: 0; }
.contact-info-row i {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: rgba(124,58,237,0.15); color: #a78bfa; font-size: 1rem;
}
.contact-info-row a {
  color: #a78bfa; text-decoration: none; font-weight: 600;
  transition: color 0.2s;
}
.contact-info-row a:hover { color: #c4b5fd; }
.contact-map-wrap {
  width: 100%; min-height: 260px; height: 260px; margin-top: 24px; border-radius: 14px;
  overflow: hidden; background: #1e1e2a; border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.contact-map-wrap iframe {
  display: block; width: 100%; height: 100%; min-height: 260px;
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.contact-map-fallback {
  margin: 10px 0 0; font-size: 0.875rem; text-align: center;
}
.contact-map-fallback a {
  color: #a78bfa; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
}
.contact-map-fallback a:hover { color: #c4b5fd; text-decoration: underline; }
body.theme-light .contact-map-fallback a { color: #5b21b6; }
body.theme-light .contact-map-fallback a:hover { color: #6d28d9; }

/* Hero */
.hero-contact { padding-bottom: 16px; text-align: center; }
.hero-contact h1 { margin: 0; font-size: 2rem; font-weight: 700; color: #f8fafc; }
.hero-contact p { margin: 10px 0 0; font-size: 1rem; color: #94a3b8; max-width: 520px; line-height: 1.6; margin-left: auto; margin-right: auto; }

/* الوضع الفاتح */
body.theme-light .contact-form-wrap, body.theme-light .contact-info-wrap {
  background: #fff; border-color: rgba(0,0,0,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
}
body.theme-light .contact-form-head, body.theme-light .contact-info-head {
  border-color: rgba(0,0,0,0.06); background: linear-gradient(90deg, rgba(124,58,237,0.06) 0%, transparent 100%);
}
body.theme-light .contact-form-head h2, body.theme-light .contact-info-head h3 { color: #1e293b; }
body.theme-light .contact-form-head h2 i, body.theme-light .contact-info-head h3 i { color: #6d28d9; }
body.theme-light .contact-form label { color: #475569; }
body.theme-light .contact-form input, body.theme-light .contact-form textarea {
  background: #f8fafc; border-color: rgba(0,0,0,0.12); color: #1e293b;
}
body.theme-light .contact-form input:focus, body.theme-light .contact-form textarea:focus {
  border-color: #7c3aed; box-shadow: 0 0 0 4px rgba(124,58,237,0.15);
}
body.theme-light .contact-info-row { color: #475569; }
body.theme-light .contact-info-row i { background: rgba(124,58,237,0.1); color: #5b21b6; }
body.theme-light .contact-info-row a { color: #5b21b6; }
body.theme-light .contact-info-row a:hover { color: #6d28d9; }
body.theme-light .hero-contact h1 { color: #0f172a; }
body.theme-light .hero-contact p { color: #64748b; }
body.theme-light .contact-map-wrap { background: #f1f5f9; border-color: rgba(0,0,0,0.08); }

@media (max-width: 768px) {
  .contact-page { padding: 0 18px 56px; }
  .contact-container { flex-direction: column; gap: 24px; padding: 20px 0; }
  .contact-form-wrap, .contact-info-wrap { max-width: none; }
  .contact-form-head, .contact-info-head { padding: 18px 20px; }
  .contact-form { padding: 22px 20px 28px; }
  .contact-info-body { padding: 20px; }
  .hero-contact h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div id="navbar"></div>
<main id="main-content" class="contact-page">
<header class="hero hero-products hero-contact">
  <h1 data-i18n="contactTitle">Contact Us</h1>
  <p data-i18n="contactDesc">We are happy to help! Send us a message and we will get back to you as soon as possible.</p>
</header>
<section class="contact-container">
  <div class="contact-form-wrap">
    <div class="contact-form-head">
      <h2><i class="fas fa-paper-plane" aria-hidden="true"></i> <span data-i18n="contactSendMessage">Send a Message</span></h2>
    </div>
    <form id="contactForm" class="contact-form">
      <div class="form-row">
        <label for="name" data-i18n="labelName">Your Name</label>
        <input type="text" id="name" name="name" data-i18n-placeholder="placeholderFullName" placeholder="Full name" required>
      </div>
      <div class="form-row">
        <label for="email" data-i18n="labelEmail">Email</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-row">
        <label for="message" data-i18n="contactMessageLabel">Message</label>
        <textarea id="message" name="message" data-i18n-placeholder="contactMessagePlaceholder" placeholder="Type your message here..." required></textarea>
      </div>
      <button type="submit" data-i18n="contactSendBtn">Send</button>
    </form>
    <p id="formMessage"></p>
  </div>
  <div class="contact-info-wrap">
    <div class="contact-info-head">
      <h3><i class="fas fa-address-card" aria-hidden="true"></i> <span data-i18n="contactInfoTitle">Contact Info</span></h3>
    </div>
    <div class="contact-info-body">
      <div class="contact-info-section">
        <div class="contact-info-row">
          <i class="fas fa-envelope" aria-hidden="true"></i>
          <span><a href="mailto:support@key2lix.com">support@key2lix.com</a></span>
        </div>
        <div class="contact-info-row">
          <i class="fas fa-phone" aria-hidden="true"></i>
          <span><a href="tel:+213123456789">+213 123 456 789</a></span>
        </div>
        <div class="contact-info-row">
          <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
          <span>Algiers, Algeria</span>
        </div>
      </div>
      <div class="contact-info-section">
        <h3 data-i18n="contactWorkingHours">Working Hours</h3>
        <div class="contact-info-row">
          <i class="fas fa-clock" aria-hidden="true"></i>
          <span>Sat - Thu: 09:00 AM - 06:00 PM</span>
        </div>
        <div class="contact-info-row">
          <i class="fas fa-clock" aria-hidden="true"></i>
          <span>Friday: Closed</span>
        </div>
      </div>
      <div class="contact-map-wrap">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12874.4467517982!2d3.058043!3d36.753768!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fb00f9c78b37d%3A0x72a6c1b8263ab3f1!2sAlgiers%2C%20Algeria!5e0!3m2!1sen!2s!4v1696827690000!5m2!1sen!2s" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="خريطة - الجزائر العاصمة"></iframe>
        <p class="contact-map-fallback">
          <a href="https://www.google.com/maps?q=Algiers,Algeria" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> <span data-i18n="openInMaps">فتح الخريطة في نافذة جديدة</span></a>
        </p>
      </div>
    </div>
  </div>
</section>
</main>
<div id="footer"></div>
<script>
if (window.emailjs) try { window.emailjs.init('ts6TK0tiUvaLHijtc'); } catch(e) {}
</script>
<script src="/assets/js/lang.js"></script>
<script src="/assets/js/common.js"></script>
<script>
(function() {
  var form = document.getElementById('contactForm');
  var submitBtn = form.querySelector('button');
  function t(k) { return (window.Key2lixLang && window.Key2lixLang.get(k)) || k; }
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = t('sending') || 'Sending…';
    var name = form.name.value.trim();
    var email = form.email.value.trim();
    var message = form.message.value.trim();
    if (!name) {
      if (window.Key2lixToast) window.Key2lixToast(t('enterName') || 'Please enter your name.', 'error'); else alert(t('enterName'));
      submitBtn.disabled = false;
      submitBtn.textContent = t('contactSendBtn') || 'Send';
      return;
    }
    if (!message) {
      if (window.Key2lixToast) window.Key2lixToast(t('contactEnterMessage') || 'Please enter your message.', 'error'); else alert(t('contactEnterMessage'));
      submitBtn.disabled = false;
      submitBtn.textContent = t('contactSendBtn') || 'Send';
      return;
    }
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      if (window.Key2lixToast) window.Key2lixToast(t('invalidEmail'), 'error'); else alert(t('invalidEmail'));
      submitBtn.disabled = false;
      submitBtn.textContent = t('contactSendBtn') || 'Send';
      return;
    }
    fetch('/api/contact', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, email: email, subject: 'Contact', message: message }) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var successMsg = t('messageSentSuccess');
        if (window.Key2lixToast) window.Key2lixToast(successMsg, 'success'); else alert(successMsg);
        if (window.emailjs) window.emailjs.send('service_lxg0fbq', 'template_tccitpm', { from_name: name, from_email: email, message: message });
        form.reset();
        submitBtn.disabled = false;
        submitBtn.textContent = t('contactSendBtn') || 'Send';
      })
      .catch(function() {
        if (window.Key2lixToast) window.Key2lixToast(t('connectionError') || 'Failed to send. Try again.', 'error'); else alert('Failed to send.');
        submitBtn.disabled = false;
        submitBtn.textContent = t('contactSendBtn') || 'Send';
      });
  });
})();
</script>
</body>
</html>
