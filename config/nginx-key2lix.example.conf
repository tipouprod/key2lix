# Key2lix — مثال إعداد Nginx كـ reverse proxy
# الاستخدام: انسخ الملف إلى مواقع Nginx (مثلاً /etc/nginx/sites-available/key2lix)
# ثم عدّل server_name و alias ومسارات SSL حسب بيئتك.

upstream key2lix_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name key2lix.com www.key2lix.com;
    # إعادة توجيه إلى HTTPS بعد تفعيل SSL:
    # return 301 https://$server_name$request_uri;

    location /assets/ {
        alias /path/to/key2lix/client/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location /pages/ {
        alias /path/to/key2lix/client/pages/;
        expires 1h;
    }

    location / {
        proxy_pass http://key2lix_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

