<!--
  قالب EmailJS الموحّد — ألوان الموقع Key2lix (#7c3aed, #5b21b6, #a78bfa). انسخ المحتوى إلى محرر القالب في EmailJS.
  Subject = {{subject}}  |  المحتوى = {{{message}}}  |  {{logo_url}} و {{site_name}}
-->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; line-height: 1.6; color: #1e293b; background: #ffffff; border: 1px solid #e9d5ff; border-radius: 12px; overflow: hidden;">
  <tr>
    <td style="padding: 0;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(180deg, #faf5ff 0%, #f5f3ff 100%); border-bottom: 2px solid #7c3aed;">
        <tr>
          <td style="padding: 32px 40px; text-align: center;">
            <a href="https://key2lix.com" target="_blank" rel="noopener" style="text-decoration: none; display: inline-block;">
              <img src="{{logo_url}}" alt="{{site_name}}" width="140" height="36" style="display: block; max-width: 140px; height: auto; border: 0; outline: none;" />
            </a>
            <p style="margin: 12px 0 0; font-size: 13px; color: #6d28d9; font-weight: 600; letter-spacing: 0.02em;">تسوق آمن وموثوق</p>
          </td>
        </tr>
      </table>
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="padding: 36px 40px 32px; direction: rtl; text-align: right; background: #ffffff;">
            {{{message}}}
          </td>
        </tr>
      </table>
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(180deg, #f5f3ff 0%, #ede9fe 100%); border-top: 2px solid #e9d5ff;">
        <tr>
          <td style="padding: 24px 40px; text-align: center; direction: rtl;">
            <p style="margin: 0; font-size: 13px; color: #5b21b6; font-weight: 600;">{{site_name}} — منصة تسوق متعددة الموردين</p>
            <p style="margin: 8px 0 0; font-size: 11px; color: #7c3aed;">هذه الرسالة آلية؛ لا ترد على هذا البريد.</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
