<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; line-height: 1.6; color: #1e293b; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;">
  <tr>
    <td style="padding: 0;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%); border-bottom: 2px solid #e2e8f0;">
        <tr>
          <td style="padding: 32px 40px; text-align: center;">
            <a href="https://key2lix.com" target="_blank" rel="noopener" style="text-decoration: none; display: inline-block;">
              <img src="{{logo_url}}" alt="{{site_name}}" width="140" height="36" style="display: block; max-width: 140px; height: auto; border: 0; outline: none;" />
            </a>
            <p style="margin: 12px 0 0; font-size: 13px; color: #64748b; font-weight: 500; letter-spacing: 0.02em;">تسوق آمن وموثوق</p>
          </td>
        </tr>
      </table>
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
          <td style="padding: 36px 40px 32px; direction: rtl; text-align: right; background: #ffffff;">
            {{{message}}}
          </td>
        </tr>
      </table>
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: #f1f5f9; border-top: 1px solid #e2e8f0;">
        <tr>
          <td style="padding: 24px 40px; text-align: center; direction: rtl;">
            <p style="margin: 0; font-size: 13px; color: #475569; font-weight: 500;">{{site_name}} — منصة تسوق متعددة الموردين</p>
            <p style="margin: 8px 0 0; font-size: 11px; color: #94a3b8;">هذه الرسالة آلية؛ لا ترد على هذا البريد.</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
